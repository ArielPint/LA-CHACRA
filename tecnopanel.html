<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tecno Panel</title>
<script src="auth.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --accent: #4f8ef7;
  --brand: #D42B1E;
  --green: #3ecf8e;
  --red: #f75f5f;
  --text: #e8eaf0;
  --muted: #7a7f99;
  --border: #2e3350;
  --sidebar-w: 220px;
  --topbar-h: 54px;
  --bottombar-h: 62px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  display: flex;
  flex-direction: column;
}

/* ── Topbar ── */
#topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
  z-index: 200;
  position: relative;
}

.hamburger {
  width: 34px;
  height: 34px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  cursor: pointer;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface2);
  flex-shrink: 0;
  transition: border-color .15s;
}
.hamburger span {
  display: block;
  width: 15px;
  height: 2px;
  background: var(--muted);
  border-radius: 2px;
  transition: background .15s;
}
.hamburger:hover { border-color: var(--accent); }
.hamburger:hover span { background: var(--text); }

.logo {
  display: flex;
  align-items: baseline;
  flex-shrink: 0;
}
.logo-tecno { font-size: 19px; font-weight: 900; color: var(--text); letter-spacing: 1.5px; }
.logo-panel { font-size: 19px; font-weight: 900; color: var(--brand); letter-spacing: 1.5px; }
.logo sup { font-size: 9px; color: var(--muted); margin-left: 2px; font-weight: 400; }

.tb-page-title {
  font-size: .82rem;
  font-weight: 600;
  color: var(--muted);
  display: none;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tb-spacer { flex: 1; }

.tb-right {
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 11px;
  border-radius: 7px;
  font-size: .74rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  text-decoration: none;
  transition: all .15s;
  white-space: nowrap;
}
.btn-ghost:hover { color: var(--text); border-color: var(--accent); }

.auth-badge {
  font-size: .7rem;
  background: rgba(255,255,255,.06);
  padding: 4px 10px;
  border-radius: 20px;
  color: var(--muted);
  border: 1px solid var(--border);
  white-space: nowrap;
}

/* ── Body layout ── */
#body-layout {
  flex: 1;
  overflow: hidden;
  margin-left: var(--sidebar-w);
  transition: margin-left .25s cubic-bezier(.4,0,.2,1);
  position: relative;
  display: flex;
}
#body-layout.sidebar-collapsed { margin-left: 0; }

/* ── Sidebar (fixed, fuera del flow) ── */
#sidebar {
  position: fixed;
  top: var(--topbar-h);
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 150;
  transition: width .25s cubic-bezier(.4,0,.2,1);
}
#sidebar.collapsed { width: 0; }

.sidebar-nav {
  flex: 1;
  padding: 10px 0;
  overflow-y: auto;
  overflow-x: hidden;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.nav-section {
  font-size: .62rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 10px 16px 4px;
  white-space: nowrap;
  transition: opacity .2s;
}
#sidebar.collapsed .nav-section { opacity: 0; pointer-events: none; }

.nav-sep { height: 1px; background: var(--border); margin: 8px 10px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  color: var(--muted);
  font-size: .875rem;
  font-weight: 500;
  transition: all .12s;
  white-space: nowrap;
  user-select: none;
  border-left: 3px solid transparent;
  position: relative;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active {
  color: var(--brand);
  background: rgba(212,43,30,.09);
  border-left-color: var(--brand);
}

.nav-icon { font-size: 1.05rem; width: 22px; text-align: center; flex-shrink: 0; }
.nav-label { transition: opacity .2s; }

#sidebar.collapsed .nav-label { opacity: 0; pointer-events: none; }
#sidebar.collapsed .nav-item {
  padding: 10px 0;
  justify-content: center;
  border-left: 3px solid transparent;
}
#sidebar.collapsed .nav-item.active { border-left-color: var(--brand); }

/* Tooltips en sidebar colapsado */
#sidebar.collapsed .nav-item::after {
  content: attr(data-label);
  position: absolute;
  left: 62px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: .78rem;
  font-weight: 500;
  padding: 5px 10px;
  border-radius: 7px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s;
  z-index: 999;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
#sidebar.collapsed .nav-item:hover::after { opacity: 1; }

/* ── Content ── */
#content {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.sheet {
  display: none;
  position: absolute;
  inset: 0;
}
.sheet.active { display: block; }

iframe {
  border: none;
  width: 100%;
  height: 100%;
  display: block;
}

/* ── Loading overlay ── */
.load-overlay {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 10;
  transition: opacity .35s;
}
.load-overlay.done {
  opacity: 0;
  pointer-events: none;
}
.spinner {
  width: 34px;
  height: 34px;
  border: 3px solid var(--border);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-label { font-size: .78rem; color: var(--muted); }

/* ── Mobile sidebar drawer ── */
#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 140;
  backdrop-filter: blur(2px);
}
#sidebar-overlay.open { display: block; }

/* ── Bottom tab bar ── */
#bottombar {
  display: none;
  height: var(--bottombar-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  color: var(--muted);
  font-size: .6rem;
  font-weight: 600;
  user-select: none;
  transition: color .12s;
  padding: 6px 4px;
  border: none;
  background: none;
  text-decoration: none;
  letter-spacing: .01em;
}
.tab-icon { font-size: 1.2rem; }
.tab-item.active { color: var(--brand); }
.tab-item:active { opacity: .7; }

/* ── Responsive ── */
@media (max-width: 768px) {
  #sidebar {
    bottom: var(--bottombar-h);
    width: 260px;
    transform: translateX(-100%);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
  }
  #sidebar.mobile-open { transform: translateX(0); }

  #body-layout { margin-left: 0 !important; }
  #bottombar { display: flex; }
  .tb-page-title { display: block; }
  .auth-badge { display: none; }
  .logo-tecno, .logo-panel { font-size: 17px; }
  #topbar { padding: 0 10px; gap: 8px; }
}

@media (max-width: 380px) {
  #tp-admin-btn { display: none !important; }
  .btn-ghost.hide-xs { display: none; }
}
</style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <button class="hamburger" onclick="toggleSidebar()" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>

  <div class="logo">
    <span class="logo-tecno">TECNO</span><span class="logo-panel">PANEL</span><sup>®</sup>
  </div>

  <span class="tb-page-title" id="tb-page-title">Dashboard</span>

  <div class="tb-spacer"></div>

  <div class="tb-right">
    <button class="btn-ghost hide-xs" onclick="recargar()">↺ Actualizar</button>
    <span class="auth-badge" id="tp-user-badge"></span>
    <a href="admin.html" class="btn-ghost" id="tp-admin-btn" style="display:none">⚙️ Admin</a>
    <button class="btn-ghost" onclick="doLogout()">Salir</button>
  </div>
</div>

<!-- Sidebar overlay (móvil) -->
<div id="sidebar-overlay" onclick="closeSidebarMobile()"></div>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="sidebar-nav">
    <div class="nav-section">Principal</div>

    <div class="nav-item active" id="dd-dashboard" data-sheet="dashboard" data-label="Dashboard" onclick="navSelect(this)">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Dashboard</span>
    </div>
    <div class="nav-item" id="dd-produccion" data-sheet="produccion" data-label="Producción" onclick="navSelect(this)">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Producción</span>
    </div>
    <div class="nav-item" id="dd-layout" data-sheet="layout" data-label="Layout" onclick="navSelect(this)">
      <span class="nav-icon">📍</span>
      <span class="nav-label">Layout</span>
    </div>
    <div class="nav-item" id="dd-despacho" data-sheet="despacho" data-label="Despacho GD" onclick="navSelect(this)">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Despacho GD</span>
    </div>

    <div class="nav-sep"></div>
    <div class="nav-section">Gestión</div>

    <div class="nav-item" id="dd-solicitudes" data-label="Solicitudes" onclick="window.location.href='solicitudes.html'" style="display:none">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Solicitudes</span>
    </div>
    <div class="nav-item" id="dd-planta" data-label="Control Planta" onclick="openPlanta()" style="display:none">
      <span class="nav-icon">🏭</span>
      <span class="nav-label">Control Planta</span>
    </div>
    <div class="nav-item" id="dd-asistencia" data-label="Asistencia GeoVictoria" onclick="window.location.href='asistencia.html'" style="display:none">
      <span class="nav-icon">👷</span>
      <span class="nav-label">Asistencia GeoVictoria</span>
    </div>
  </div>
</nav>

<!-- Body layout -->
<div id="body-layout">

  <!-- Content -->
  <div id="content">
    <div class="sheet active" id="sheet-dashboard">
      <div class="load-overlay" id="load-dashboard">
        <div class="spinner"></div>
        <span class="load-label">Cargando Dashboard…</span>
      </div>
      <iframe id="frame-dashboard" src="dashboard.html" title="Dashboard" onload="iframeLoaded('dashboard')"></iframe>
    </div>
    <div class="sheet" id="sheet-produccion">
      <div class="load-overlay" id="load-produccion">
        <div class="spinner"></div>
        <span class="load-label">Cargando Producción…</span>
      </div>
      <iframe id="frame-produccion" src="" title="Produccion" onload="iframeLoaded('produccion')"></iframe>
    </div>
    <div class="sheet" id="sheet-layout">
      <div class="load-overlay" id="load-layout">
        <div class="spinner"></div>
        <span class="load-label">Cargando Layout…</span>
      </div>
      <iframe id="frame-layout" src="" title="Layout" onload="iframeLoaded('layout')"></iframe>
    </div>
    <div class="sheet" id="sheet-despacho">
      <div class="load-overlay" id="load-despacho">
        <div class="spinner"></div>
        <span class="load-label">Cargando Despacho GD…</span>
      </div>
      <iframe id="frame-despacho" src="" title="Despacho GD" onload="iframeLoaded('despacho')"></iframe>
    </div>
  </div>
</div>

<!-- Bottom tab bar (solo móvil) -->
<div id="bottombar">
  <button class="tab-item active" id="tab-dashboard" data-sheet="dashboard" onclick="navSelectTab(this)">
    <span class="tab-icon">🏠</span>
    <span>Dashboard</span>
  </button>
  <button class="tab-item" id="tab-produccion" data-sheet="produccion" onclick="navSelectTab(this)">
    <span class="tab-icon">📈</span>
    <span>Producción</span>
  </button>
  <button class="tab-item" id="tab-layout" data-sheet="layout" onclick="navSelectTab(this)">
    <span class="tab-icon">📍</span>
    <span>Layout</span>
  </button>
  <button class="tab-item" id="tab-despacho" data-sheet="despacho" onclick="navSelectTab(this)">
    <span class="tab-icon">📦</span>
    <span>Despacho</span>
  </button>
  <button class="tab-item" id="tab-more" onclick="toggleSidebarMobile()">
    <span class="tab-icon">☰</span>
    <span>Más</span>
  </button>
</div>

<script>
// ── Auth guard ──────────────────────────────────────────────────────────────
(function(){
  var s = AUTH.requireAuth('login.html');
  if (!s) return;

  var badge = document.getElementById('tp-user-badge');
  if (badge) badge.textContent = s.name + ' · ' + (AUTH.getRoles()[s.role] ? AUTH.getRoles()[s.role].label : s.role);

  if (AUTH.isAdmin()) {
    var ab = document.getElementById('tp-admin-btn');
    if (ab) ab.style.display = 'inline-flex';
  }

  if (AUTH.canAccessPage('solicitudes')) {
    var el = document.getElementById('dd-solicitudes');
    if (el) el.style.display = 'flex';
  }
  if (AUTH.canAccessPlanta()) {
    var el2 = document.getElementById('dd-planta');
    if (el2) el2.style.display = 'flex';
  }
  if (AUTH.canAccessPage('geovictoria')) {
    var el3 = document.getElementById('dd-asistencia');
    if (el3) el3.style.display = 'flex';
  }

  // Ocultar páginas sin acceso
  var pages = ['dashboard','produccion','layout','despacho'];
  var firstVisible = null;
  pages.forEach(function(p) {
    if (!AUTH.canAccessPage(p)) {
      var si = document.getElementById('dd-' + p);
      if (si) si.style.display = 'none';
      var ti = document.getElementById('tab-' + p);
      if (ti) ti.style.display = 'none';
    } else if (!firstVisible) {
      firstVisible = p;
    }
  });

  if (firstVisible && firstVisible !== 'dashboard') {
    document.getElementById('dd-dashboard').classList.remove('active');
    var ni = document.getElementById('dd-' + firstVisible);
    if (ni) ni.classList.add('active');
    document.getElementById('tab-dashboard').classList.remove('active');
    var ti = document.getElementById('tab-' + firstVisible);
    if (ti) ti.classList.add('active');
    document.querySelectorAll('.sheet').forEach(function(sh){ sh.classList.remove('active'); });
    var sh = document.getElementById('sheet-' + firstVisible);
    if (sh) sh.classList.add('active');
    updatePageTitle(firstVisible);
    loadSheet(firstVisible);
  }
})();

// ── Sidebar ────────────────────────────────────────────────────────────────
var sidebarCollapsed = false;
var isMobile = function(){ return window.innerWidth <= 768; };

function toggleSidebar() {
  if (isMobile()) {
    toggleSidebarMobile();
  } else {
    sidebarCollapsed = !sidebarCollapsed;
    document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
    document.getElementById('body-layout').classList.toggle('sidebar-collapsed', sidebarCollapsed);
  }
}

function toggleSidebarMobile() {
  var sb = document.getElementById('sidebar');
  var ov = document.getElementById('sidebar-overlay');
  var open = sb.classList.contains('mobile-open');
  sb.classList.toggle('mobile-open', !open);
  ov.classList.toggle('open', !open);
}

function closeSidebarMobile() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ── Nav ────────────────────────────────────────────────────────────────────
function navSelect(el) {
  var sheet = el.dataset.sheet;
  if (!sheet) return;
  document.querySelectorAll('.nav-item').forEach(function(i){ i.classList.remove('active'); });
  el.classList.add('active');
  document.querySelectorAll('.tab-item').forEach(function(t){ t.classList.remove('active'); });
  var tab = document.getElementById('tab-' + sheet);
  if (tab) tab.classList.add('active');
  updatePageTitle(el.dataset.label || sheet);
  showSheet(sheet);
  if (isMobile()) closeSidebarMobile();
}

function navSelectTab(el) {
  var sheet = el.dataset.sheet;
  if (!sheet) return;
  document.querySelectorAll('.tab-item').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(function(i){ i.classList.remove('active'); });
  var nav = document.getElementById('dd-' + sheet);
  if (nav) nav.classList.add('active');
  var label = el.querySelector('span:last-child');
  updatePageTitle(label ? label.textContent : sheet);
  showSheet(sheet);
}

function updatePageTitle(label) {
  var el = document.getElementById('tb-page-title');
  if (el) el.textContent = label;
}

// ── Sheets ─────────────────────────────────────────────────────────────────
var loaded = { dashboard: true, produccion: false, layout: false, despacho: false };
var srcs   = { produccion: 'produccion.html', layout: 'layout.html', despacho: 'compras.html' };

function showSheet(name) {
  document.querySelectorAll('.sheet').forEach(function(s){ s.classList.remove('active'); });
  var sh = document.getElementById('sheet-' + name);
  if (sh) sh.classList.add('active');
  loadSheet(name);
}

function loadSheet(name) {
  if (!loaded[name] && srcs[name]) {
    document.getElementById('frame-' + name).src = srcs[name];
    loaded[name] = true;
  }
}

function iframeLoaded(name) {
  var ov = document.getElementById('load-' + name);
  if (ov) ov.classList.add('done');
}

// ── Acciones ───────────────────────────────────────────────────────────────
function openPlanta() { window.open('control-planta.html', '_blank'); }
function doLogout() { AUTH.logout(); window.location.href = 'login.html'; }

function recargar() {
  Object.keys(loaded).forEach(function(name) {
    if (loaded[name]) {
      var f = document.getElementById('frame-' + name);
      if (f && f.src) {
        var ov = document.getElementById('load-' + name);
        if (ov) ov.classList.remove('done');
        f.src = f.src;
      }
    }
  });
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeSidebarMobile(); });

window.addEventListener('storage', function(e) {
  if (e.key === 'tp_dashboard_data') {
    var f = document.getElementById('frame-dashboard');
    if (f) { document.getElementById('load-dashboard').classList.remove('done'); f.src = f.src; }
  }
  if (e.key === 'tp_produccion_data' && loaded.produccion) {
    var f = document.getElementById('frame-produccion');
    if (f) { document.getElementById('load-produccion').classList.remove('done'); f.src = f.src; }
  }
});
</script>
</body>
</html>
