<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud de Materiales · La Chacra</title>
<script src="auth.js"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--accent:#4f8ef7;--brand:#D42B1E;--green:#3ecf8e;--red:#f75f5f;--yellow:#f5a623;--text:#e8eaf0;--muted:#7a7f99;--border:#2e3350;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;font-size:14px}

/* ── Topbar ── */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:0;flex-shrink:0;height:54px}
.logo-area{display:flex;align-items:center;margin-right:28px;white-space:nowrap}
.tb-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.auth-badge{font-size:.72rem;background:rgba(255,255,255,0.08);padding:3px 9px;border-radius:20px;color:var(--muted);white-space:nowrap}
.auth-sm-btn{font-size:.72rem;padding:4px 10px;background:rgba(255,255,255,0.08);color:var(--muted);border:1px solid var(--border);border-radius:5px;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap}
.auth-sm-btn:hover{color:var(--text);border-color:var(--accent)}

/* ── Tab nav ── */
#tab-nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:0;padding:0 24px;flex-shrink:0}
.tab-btn{padding:0 22px;height:46px;font-size:.85rem;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--brand);border-bottom-color:var(--brand)}

/* ── Main content area ── */
#main{flex:1;overflow-y:auto;padding:28px 32px}

/* ── Tab panels ── */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── Cards / sections ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:20px}
.card-title{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}

/* ── Form auto fields ── */
.auto-fields{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px}
.auto-field{flex:1;min-width:200px}
.auto-field label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.auto-value{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:.9rem;cursor:default}

/* ── Items table ── */
.items-header{display:grid;grid-template-columns:1fr 80px 70px 36px;gap:8px;padding:0 4px 6px;border-bottom:1px solid var(--border);margin-bottom:8px}
.items-header span{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.item-row{display:grid;grid-template-columns:1fr 80px 70px 36px;gap:8px;align-items:center;margin-bottom:8px;position:relative}

/* ── Combobox ── */
.combo-wrap{position:relative}
.combo-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:.85rem;outline:none;transition:border-color .15s}
.combo-input:focus{border-color:var(--accent)}
.combo-input.selected{border-color:var(--green)}
.combo-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1e2235;border:1px solid var(--border);border-radius:6px;max-height:200px;overflow-y:auto;z-index:100;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.combo-dropdown.open{display:block}
.combo-option{padding:8px 12px;cursor:pointer;font-size:.82rem;border-bottom:1px solid rgba(46,51,80,.4);transition:background .1s;line-height:1.3}
.combo-option:last-child{border-bottom:none}
.combo-option:hover,.combo-option.highlighted{background:rgba(79,142,247,.12);color:var(--text)}
.combo-option .opt-code{font-size:.7rem;color:var(--muted);margin-right:6px;font-family:monospace}
.combo-option .opt-grupo{font-size:.68rem;color:var(--accent);float:right;margin-left:4px}
.combo-add-new{padding:8px 12px;cursor:pointer;font-size:.82rem;color:var(--yellow);border-top:1px solid var(--border);background:rgba(245,166,35,.05);transition:background .1s}
.combo-add-new:hover{background:rgba(245,166,35,.12)}

/* ── Inputs ── */
.qty-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 8px;color:var(--text);font-size:.85rem;outline:none;text-align:center;transition:border-color .15s}
.qty-input:focus{border-color:var(--accent)}
.unit-badge{font-size:.75rem;color:var(--muted);text-align:center;padding:4px 0}
.btn-remove{background:rgba(247,95,95,.1);border:1px solid rgba(247,95,95,.25);border-radius:6px;color:var(--red);cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s;flex-shrink:0}
.btn-remove:hover{background:rgba(247,95,95,.25)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:6px;font-size:.84rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:#b81915;transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:#0f1117}
.btn-green:hover{background:#30b878;transform:translateY(-1px)}
.btn-sm{padding:5px 12px;font-size:.78rem}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.btn-add{background:transparent;border:1px dashed var(--border);color:var(--muted);width:100%;margin-top:4px;padding:9px;border-radius:6px;cursor:pointer;transition:all .15s;font-size:.83rem}
.btn-add:hover{border-color:var(--accent);color:var(--accent)}

/* ── Form actions ── */
.form-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}

/* ── Summary table (preview) ── */
.summary-meta{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:var(--surface2);border-radius:6px;border:1px solid var(--border)}
.summary-meta .meta-item{font-size:.82rem}
.summary-meta .meta-label{color:var(--muted);margin-right:6px}

.data-table{width:100%;border-collapse:collapse;font-size:.84rem}
.data-table th{padding:9px 12px;text-align:left;font-size:.71rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.data-table td{padding:9px 12px;border-bottom:1px solid rgba(46,51,80,.5)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(255,255,255,.02)}
.data-table .code-cell{font-family:monospace;font-size:.82rem;color:var(--accent)}
.data-table .num{text-align:center}
.data-table .unit-cell{color:var(--muted);font-size:.78rem}

/* ── Obs textarea ── */
.obs-wrap{margin-top:16px}
.obs-wrap label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase}
.obs-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-size:.85rem;resize:vertical;min-height:72px;outline:none;font-family:inherit;transition:border-color .15s}
.obs-input:focus{border-color:var(--accent)}

/* ── History filters ── */
.hist-filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.hist-filter-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-size:.83rem;outline:none;transition:border-color .15s}
.hist-filter-input:focus{border-color:var(--accent)}

/* ── Status badges ── */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.71rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.badge-pending{background:rgba(245,166,35,.15);color:var(--yellow)}
.badge-approved{background:rgba(62,207,142,.15);color:var(--green)}
.badge-rejected{background:rgba(247,95,95,.15);color:var(--red)}

/* ── Expandable rows ── */
.hist-row{cursor:pointer}
.hist-detail{display:none;background:var(--surface2)}
.hist-detail.open{display:table-row}
.hist-detail td{padding:10px 16px}
.hist-detail-inner{border-radius:6px;overflow:hidden}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;display:none}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:480px;max-width:95vw}
.modal h3{font-size:1rem;margin-bottom:18px;color:var(--text)}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase}
.modal-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:.87rem;outline:none;transition:border-color .15s}
.modal-input:focus{border-color:var(--accent)}
.modal-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:.87rem;outline:none}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:.84rem;color:var(--text);opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;z-index:2000;max-width:320px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:10px}

/* ── Loading ── */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--brand);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ── */
@media(max-width:600px){
  #main{padding:16px}
  .items-header,.item-row{grid-template-columns:1fr 70px 55px 32px}
  .auto-fields{flex-direction:column}
}
</style>
</head>
<body>

<!-- ── Topbar ── -->
<div id="topbar">
  <div class="logo-area">
    <a href="tecnopanel.html" style="text-decoration:none;display:flex;align-items:center;gap:2px">
      <span style="font-size:22px;font-weight:900;color:#e8eaf0;letter-spacing:1px">TECNO</span><span style="font-size:22px;font-weight:900;color:#D42B1E;letter-spacing:1px">PANEL</span>
    </a>
    <span style="color:var(--border);margin:0 10px">·</span>
    <span style="color:var(--muted);font-size:.85rem;font-weight:600">Solicitud de Materiales</span>
  </div>
  <div class="tb-right">
    <span class="auth-badge" id="user-badge"></span>
    <a href="tecnopanel.html" class="auth-sm-btn">← Portal</a>
    <button class="auth-sm-btn" onclick="AUTH.logout();location.href='login.html'">Salir</button>
  </div>
</div>

<!-- ── Tab nav ── -->
<div id="tab-nav">
  <button class="tab-btn active" onclick="showTab('form')" id="tab-btn-form">📋 Nueva Solicitud</button>
  <button class="tab-btn" onclick="showTab('preview')" id="tab-btn-preview">👁 Vista Previa</button>
  <button class="tab-btn" onclick="showTab('history')" id="tab-btn-history">📂 Historial</button>
  <button class="tab-btn" onclick="showTab('products')" id="tab-btn-products" style="display:none">🗂 Catálogo</button>
</div>

<!-- ── Main ── -->
<div id="main">

  <!-- ════════ TAB 1: NUEVA SOLICITUD ════════ -->
  <div id="panel-form" class="tab-panel active">
    <div class="card">
      <div class="card-title">Datos automáticos</div>
      <div class="auto-fields">
        <div class="auto-field">
          <label>Fecha Solicitud</label>
          <div class="auto-value" id="auto-fecha">—</div>
        </div>
        <div class="auto-field">
          <label>Usuario que solicita</label>
          <div class="auto-value" id="auto-user">—</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Productos solicitados</div>
      <div class="items-header">
        <span>Producto</span>
        <span style="text-align:center">Cantidad</span>
        <span style="text-align:center">Unidad</span>
        <span></span>
      </div>
      <div id="items-list"></div>
      <button class="btn-add" onclick="addItemRow()">+ Agregar producto</button>
    </div>

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="clearForm()">🗑 Limpiar</button>
      <button class="btn btn-primary" onclick="goToPreview()">Ver resumen →</button>
    </div>
  </div>

  <!-- ════════ TAB 2: VISTA PREVIA ════════ -->
  <div id="panel-preview" class="tab-panel">
    <div class="card">
      <div class="card-title">Resumen de solicitud</div>
      <div class="summary-meta" id="preview-meta"></div>
      <table class="data-table" id="preview-table">
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th>Código</th>
            <th>Descripción</th>
            <th class="num">Cantidad</th>
            <th>Unidad</th>
          </tr>
        </thead>
        <tbody id="preview-tbody"></tbody>
      </table>
      <div class="obs-wrap">
        <label>Observaciones (opcional)</label>
        <textarea class="obs-input" id="obs-input" placeholder="Instrucciones especiales, urgencia, destino, etc."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="showTab('form')">← Volver a editar</button>
      <button class="btn btn-green" id="submit-btn" onclick="submitSolicitud()">✔ Enviar solicitud</button>
    </div>
  </div>

  <!-- ════════ TAB 3: HISTORIAL ════════ -->
  <div id="panel-history" class="tab-panel">
    <div class="card" style="padding:14px 20px">
      <div class="hist-filters">
        <input class="hist-filter-input" id="hist-search" placeholder="🔍 Buscar por usuario o producto..." oninput="renderHistory()" style="flex:1;min-width:200px">
        <input class="hist-filter-input" id="hist-date" type="date" oninput="renderHistory()" title="Filtrar por fecha">
        <select class="hist-filter-input" id="hist-status" onchange="renderHistory()" style="min-width:130px">
          <option value="">Todos los estados</option>
          <option value="pendiente">Pendiente</option>
          <option value="aprobada">Aprobada</option>
          <option value="rechazada">Rechazada</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="loadHistory()">↻ Actualizar</button>
      </div>
    </div>
    <div id="history-container">
      <div class="empty"><div class="empty-icon">📂</div><div>Cargando historial...</div></div>
    </div>
  </div>

  <!-- ════════ TAB 4: CATÁLOGO (solo canEditProducts) ════════ -->
  <div id="panel-products" class="tab-panel">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="card-title" style="margin:0">Catálogo de productos</div>
        <button class="btn btn-primary btn-sm" onclick="openAddProduct()">+ Nuevo producto</button>
      </div>
      <div style="margin-bottom:12px">
        <input class="hist-filter-input" id="cat-search" placeholder="🔍 Buscar código o descripción..." oninput="renderCatalog()" style="width:100%">
      </div>
      <table class="data-table" id="catalog-table">
        <thead>
          <tr>
            <th>Código</th>
            <th>Descripción</th>
            <th>Unidad</th>
            <th>Grupo</th>
            <th>Fuente</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="catalog-tbody"></tbody>
      </table>
    </div>
  </div>

</div><!-- /main -->

<!-- ════════ MODAL: AGREGAR PRODUCTO ════════ -->
<div class="modal-bg" id="modal-product">
  <div class="modal">
    <h3>➕ Agregar nuevo producto</h3>
    <div class="modal-field">
      <label>Código *</label>
      <input class="modal-input" id="np-codigo" placeholder="Ej: 123456" maxlength="40">
    </div>
    <div class="modal-field">
      <label>Descripción *</label>
      <input class="modal-input" id="np-descripcion" placeholder="Descripción completa del producto">
    </div>
    <div class="modal-field" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div>
        <label>Unidad *</label>
        <select class="modal-select" id="np-unidad">
          <option>UND</option><option>CJA</option><option>GAL</option><option>KG</option>
          <option>KIT</option><option>LTS</option><option>M2</option><option>ML</option>
          <option>MTS</option><option>PL</option><option>PZA</option><option>RLL</option>
          <option>TIN</option><option>TRA</option>
        </select>
      </div>
      <div>
        <label>Grupo</label>
        <select class="modal-select" id="np-grupo">
          <option value="">Sin grupo</option>
          <option>OBRA GRUESA</option><option>TERMINACION</option>
          <option>GRIFERIA</option><option>MUEBLERIA</option>
        </select>
      </div>
    </div>
    <div class="modal-field">
      <label>Subgrupo</label>
      <input class="modal-input" id="np-subgrupo" placeholder="Ej: FIJACION, MADERA (opcional)">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewProduct()" id="save-product-btn">Guardar producto</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

// ════════════════════════════════════════════════════
//  ESTADO DE LA APP
// ════════════════════════════════════════════════════
let SESSION = null;
let rowCounter = 0;
let allProducts = [];     // base + custom
let productosCustom = []; // solo los de Supabase
let historyData = [];
let pendingNewProduct = null; // guardar texto buscado cuando no existe

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
(async function init() {
  SESSION = AUTH.requireAuth('login.html');
  if (!SESSION) return;

  // Badge
  document.getElementById('user-badge').textContent = SESSION.name + ' · ' + SESSION.role;

  // Fecha
  const now = new Date();
  document.getElementById('auto-fecha').textContent = now.toLocaleDateString('es-CL', {
    weekday:'long', year:'numeric', month:'long', day:'numeric'
  });
  document.getElementById('auto-user').textContent = SESSION.name;

  // Pestaña Catálogo: visible solo a canEditProducts
  if (canEditProducts()) {
    document.getElementById('tab-btn-products').style.display = '';
  }

  // Cargar productos custom de Supabase
  await loadCustomProducts();

  // Primera fila
  addItemRow();

  // Historial
  loadHistory();
})();

// ════════════════════════════════════════════════════
//  PERMISOS
// ════════════════════════════════════════════════════
function canEditProducts() {
  if (!SESSION) return false;
  if (SESSION.role === 'admin') return true;
  const p = SESSION.permissions;
  return p && p.canEditProducts === true;
}

// ════════════════════════════════════════════════════
//  PRODUCTOS: combinar base + custom
// ════════════════════════════════════════════════════
async function loadCustomProducts() {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/productos_custom?activo=eq.true&select=*`, {
      headers: SUPA_HEADERS
    });
    if (r.ok) {
      productosCustom = await r.json();
    }
  } catch(e) { productosCustom = []; }
  rebuildAllProducts();
}

function rebuildAllProducts() {
  // Custom products override / extend base
  const baseMap = {};
  PRODUCTOS_BASE.forEach(p => { baseMap[p.codigo.toUpperCase()] = p; });
  productosCustom.forEach(p => { baseMap[p.codigo.toUpperCase()] = p; });
  allProducts = Object.values(baseMap).sort((a,b) => a.descripcion.localeCompare(b.descripcion));
}

function searchProducts(query) {
  if (!query || query.length < 1) return allProducts.slice(0, 40);
  const q = query.toLowerCase();
  return allProducts.filter(p =>
    p.descripcion.toLowerCase().includes(q) ||
    p.codigo.toLowerCase().includes(q) ||
    (p.grupo && p.grupo.toLowerCase().includes(q)) ||
    (p.subgrupo && p.subgrupo.toLowerCase().includes(q))
  ).slice(0, 50);
}

// ════════════════════════════════════════════════════
//  ITEMS / COMBOBOX
// ════════════════════════════════════════════════════
function addItemRow() {
  const id = ++rowCounter;
  const list = document.getElementById('items-list');
  const div = document.createElement('div');
  div.className = 'item-row';
  div.id = 'row-' + id;
  div.dataset.codigo = '';
  div.dataset.descripcion = '';
  div.dataset.unidad = '';

  div.innerHTML = `
    <div class="combo-wrap">
      <input class="combo-input" id="combo-input-${id}" placeholder="Buscar producto por descripción o código..."
        autocomplete="off"
        oninput="onComboInput(${id}, this.value)"
        onfocus="onComboFocus(${id})"
        onblur="onComboBlur(${id})"
        onkeydown="onComboKey(event, ${id})">
      <div class="combo-dropdown" id="combo-dd-${id}"></div>
    </div>
    <input class="qty-input" id="qty-${id}" type="number" min="1" step="1" placeholder="0" value="">
    <div class="unit-badge" id="unit-${id}">—</div>
    <button class="btn-remove" onclick="removeRow(${id})" title="Eliminar">✕</button>`;

  list.appendChild(div);
}

function removeRow(id) {
  const el = document.getElementById('row-' + id);
  if (el) el.remove();
  // Garantizar al menos una fila
  if (document.getElementById('items-list').children.length === 0) addItemRow();
}

let comboTimeout = {};

function onComboInput(id, val) {
  clearTimeout(comboTimeout[id]);
  comboTimeout[id] = setTimeout(() => showDropdown(id, val), 120);
  // Reset selección si el usuario escribe
  const row = document.getElementById('row-' + id);
  row.dataset.codigo = '';
  document.getElementById('combo-input-' + id).classList.remove('selected');
}

function onComboFocus(id) {
  const val = document.getElementById('combo-input-' + id).value;
  showDropdown(id, val);
}

function onComboBlur(id) {
  setTimeout(() => {
    const dd = document.getElementById('combo-dd-' + id);
    if (dd) dd.classList.remove('open');
  }, 180);
}

function onComboKey(e, id) {
  const dd = document.getElementById('combo-dd-' + id);
  const items = dd.querySelectorAll('.combo-option, .combo-add-new');
  let cur = [...items].findIndex(el => el.classList.contains('highlighted'));
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    const next = Math.min(cur + 1, items.length - 1);
    items.forEach(el => el.classList.remove('highlighted'));
    if (items[next]) items[next].classList.add('highlighted');
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = Math.max(cur - 1, 0);
    items.forEach(el => el.classList.remove('highlighted'));
    if (items[prev]) items[prev].classList.add('highlighted');
  } else if (e.key === 'Enter' || e.key === 'Tab') {
    const hi = dd.querySelector('.highlighted');
    if (hi) { e.preventDefault(); hi.click(); }
  } else if (e.key === 'Escape') {
    dd.classList.remove('open');
  }
}

function showDropdown(id, query) {
  const dd = document.getElementById('combo-dd-' + id);
  const results = searchProducts(query);
  dd.innerHTML = '';

  results.forEach(p => {
    const opt = document.createElement('div');
    opt.className = 'combo-option';
    const grupoTag = p.grupo ? `<span class="opt-grupo">${p.grupo}</span>` : '';
    opt.innerHTML = `<span class="opt-code">[${p.codigo}]</span>${grupoTag}${escHtml(p.descripcion)}`;
    opt.onmousedown = () => selectProduct(id, p);
    dd.appendChild(opt);
  });

  // Opción "Agregar nuevo" (si no hay match exacto y tiene permiso)
  if (query && query.length > 2) {
    const exactMatch = allProducts.find(p =>
      p.descripcion.toLowerCase() === query.toLowerCase() ||
      p.codigo.toLowerCase() === query.toLowerCase()
    );
    if (!exactMatch) {
      const addOpt = document.createElement('div');
      addOpt.className = 'combo-add-new';
      addOpt.innerHTML = `${canEditProducts() ? '➕ Agregar' : '⚠️ No existe'} "<strong>${escHtml(query)}</strong>" ${canEditProducts() ? 'al catálogo' : '— Contactar admin'}`;
      addOpt.onmousedown = () => {
        dd.classList.remove('open');
        if (canEditProducts()) openAddProduct(query);
        else toast('Este producto no existe. Contacta al administrador para agregarlo.', 'err');
      };
      dd.appendChild(addOpt);
    }
  }

  dd.classList.toggle('open', dd.children.length > 0);
}

function selectProduct(id, p) {
  const inp = document.getElementById('combo-input-' + id);
  inp.value = p.descripcion;
  inp.classList.add('selected');
  const row = document.getElementById('row-' + id);
  row.dataset.codigo = p.codigo;
  row.dataset.descripcion = p.descripcion;
  row.dataset.unidad = p.unidad;
  row.dataset.grupo = p.grupo || '';
  document.getElementById('unit-' + id).textContent = p.unidad;
  document.getElementById('combo-dd-' + id).classList.remove('open');
  document.getElementById('qty-' + id).focus();
}

// ════════════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════════════
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('tab-btn-' + name).classList.add('active');
  if (name === 'history') loadHistory();
  if (name === 'products') renderCatalog();
}

// ════════════════════════════════════════════════════
//  PREVIEW
// ════════════════════════════════════════════════════
function goToPreview() {
  const items = getValidItems();
  if (items.length === 0) {
    toast('Agrega al menos un producto con cantidad.', 'err');
    return;
  }

  // Meta
  const now = new Date();
  document.getElementById('preview-meta').innerHTML = `
    <div class="meta-item"><span class="meta-label">Fecha:</span>${now.toLocaleDateString('es-CL', {weekday:'short',year:'numeric',month:'short',day:'numeric'})}</div>
    <div class="meta-item"><span class="meta-label">Solicitante:</span>${SESSION.name}</div>
    <div class="meta-item"><span class="meta-label">N° productos:</span>${items.length}</div>`;

  // Tabla
  const tbody = document.getElementById('preview-tbody');
  tbody.innerHTML = items.map((it, i) => `
    <tr>
      <td class="num">${i+1}</td>
      <td class="code-cell">${escHtml(it.codigo)}</td>
      <td>${escHtml(it.descripcion)}</td>
      <td class="num">${it.cantidad}</td>
      <td class="unit-cell">${escHtml(it.unidad)}</td>
    </tr>`).join('');

  showTab('preview');
}

function getValidItems() {
  const rows = document.querySelectorAll('#items-list .item-row');
  const items = [];
  rows.forEach(row => {
    const codigo = row.dataset.codigo;
    const descripcion = row.dataset.descripcion;
    const unidad = row.dataset.unidad;
    const qtyEl = row.querySelector('.qty-input');
    const qty = parseFloat(qtyEl ? qtyEl.value : 0);
    if (codigo && descripcion && qty > 0) {
      items.push({ codigo, descripcion, unidad, cantidad: qty, grupo: row.dataset.grupo || '' });
    }
  });
  return items;
}

function clearForm() {
  document.getElementById('items-list').innerHTML = '';
  rowCounter = 0;
  addItemRow();
  document.getElementById('obs-input').value = '';
}

// ════════════════════════════════════════════════════
//  ENVIAR SOLICITUD → SUPABASE
// ════════════════════════════════════════════════════
async function submitSolicitud() {
  const items = getValidItems();
  if (items.length === 0) { toast('Sin productos válidos.', 'err'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Enviando...';

  const payload = {
    usuario_id: SESSION.id,
    username: SESSION.username,
    nombre: SESSION.name,
    items: items,
    observacion: document.getElementById('obs-input').value.trim() || null,
    estado: 'pendiente'
  };

  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/solicitudes`, {
      method: 'POST',
      headers: { ...SUPA_HEADERS, 'Prefer': 'return=representation' },
      body: JSON.stringify(payload)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    toast('✔ Solicitud enviada correctamente.', 'ok');
    clearForm();
    document.getElementById('obs-input').value = '';
    // Cargar historial y mostrar
    await loadHistory();
    setTimeout(() => showTab('history'), 1200);
  } catch(e) {
    toast('Error al enviar: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✔ Enviar solicitud';
  }
}

// ════════════════════════════════════════════════════
//  HISTORIAL
// ════════════════════════════════════════════════════
async function loadHistory() {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/solicitudes?select=*&order=created_at.desc`, {
      headers: SUPA_HEADERS
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    historyData = await r.json();
  } catch(e) {
    historyData = [];
  }
  renderHistory();
}

function renderHistory() {
  const search = (document.getElementById('hist-search')?.value || '').toLowerCase();
  const dateFilter = document.getElementById('hist-date')?.value || '';
  const statusFilter = document.getElementById('hist-status')?.value || '';

  let data = historyData;

  // Filtrar por usuario (no-admin solo ve las propias)
  if (SESSION.role !== 'admin') {
    data = data.filter(s => s.usuario_id === SESSION.id);
  }

  if (search) {
    data = data.filter(s =>
      s.nombre.toLowerCase().includes(search) ||
      s.username.toLowerCase().includes(search) ||
      (s.items || []).some(it =>
        it.descripcion.toLowerCase().includes(search) ||
        it.codigo.toLowerCase().includes(search)
      )
    );
  }
  if (dateFilter) {
    data = data.filter(s => s.created_at && s.created_at.startsWith(dateFilter));
  }
  if (statusFilter) {
    data = data.filter(s => s.estado === statusFilter);
  }

  const container = document.getElementById('history-container');

  if (data.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div>No hay solicitudes${search || dateFilter || statusFilter ? ' que coincidan' : ''}.</div></div>`;
    return;
  }

  const isAdmin = SESSION.role === 'admin';

  container.innerHTML = `<div class="card" style="padding:0;overflow:hidden">
    <table class="data-table">
      <thead>
        <tr>
          <th style="width:40px"></th>
          <th>Fecha</th>
          <th>Solicitante</th>
          <th class="num">Items</th>
          <th>Estado</th>
          ${isAdmin ? '<th>Acciones</th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${data.map(s => histRow(s, isAdmin)).join('')}
      </tbody>
    </table>
  </div>`;
}

function histRow(s, isAdmin) {
  const fecha = new Date(s.created_at).toLocaleDateString('es-CL', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const badge = statusBadge(s.estado);
  const items = s.items || [];
  const detailId = 'det-' + s.id;

  const detailRows = items.map((it, i) => `
    <tr style="font-size:.8rem">
      <td class="num" style="padding:4px 12px;color:var(--muted)">${i+1}</td>
      <td class="code-cell" style="padding:4px 12px">${escHtml(it.codigo)}</td>
      <td style="padding:4px 12px">${escHtml(it.descripcion)}</td>
      <td class="num" style="padding:4px 12px">${it.cantidad}</td>
      <td class="unit-cell" style="padding:4px 12px">${escHtml(it.unidad)}</td>
    </tr>`).join('');

  const obsRow = s.observacion ? `<tr><td colspan="5" style="padding:6px 12px;font-size:.78rem;color:var(--muted)">📝 ${escHtml(s.observacion)}</td></tr>` : '';

  const adminActions = isAdmin ? `
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" style="background:rgba(62,207,142,.15);color:var(--green);border:1px solid rgba(62,207,142,.25)" onclick="updateEstado('${s.id}','aprobada')">✔</button>
        <button class="btn btn-sm" style="background:rgba(247,95,95,.15);color:var(--red);border:1px solid rgba(247,95,95,.25)" onclick="updateEstado('${s.id}','rechazada')">✕</button>
      </div>
    </td>` : '';

  return `
    <tr class="hist-row" onclick="toggleDetail('${detailId}')">
      <td style="color:var(--muted);font-size:.8rem;text-align:center">▶</td>
      <td style="font-size:.82rem">${fecha}</td>
      <td style="font-size:.84rem">${escHtml(s.nombre)}</td>
      <td class="num">${items.length}</td>
      <td>${badge}</td>
      ${adminActions}
    </tr>
    <tr id="${detailId}" class="hist-detail">
      <td colspan="${isAdmin ? 6 : 5}" style="padding:0">
        <div style="margin:0 12px 12px;background:var(--bg);border-radius:6px;overflow:hidden;border:1px solid var(--border)">
          <table class="data-table" style="margin:0">
            <thead>
              <tr style="font-size:.7rem">
                <th style="width:36px">#</th><th>Código</th><th>Descripción</th><th class="num">Cant.</th><th>Unidad</th>
              </tr>
            </thead>
            <tbody>${detailRows}${obsRow}</tbody>
          </table>
        </div>
      </td>
    </tr>`;
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
  // rotar flecha
  const prevRow = el.previousElementSibling;
  if (prevRow) {
    const arrow = prevRow.querySelector('td:first-child');
    if (arrow) arrow.textContent = el.classList.contains('open') ? '▼' : '▶';
  }
}

async function updateEstado(id, estado) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/solicitudes?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...SUPA_HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ estado })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    toast('Estado actualizado.', 'ok');
    loadHistory();
  } catch(e) { toast('Error: ' + e.message, 'err'); }
}

function statusBadge(estado) {
  const map = { pendiente: 'badge-pending', aprobada: 'badge-approved', rechazada: 'badge-rejected' };
  const labels = { pendiente: 'Pendiente', aprobada: 'Aprobada', rechazada: 'Rechazada' };
  return `<span class="badge ${map[estado] || ''}">${labels[estado] || estado}</span>`;
}

// ════════════════════════════════════════════════════
//  CATÁLOGO (admin/canEditProducts)
// ════════════════════════════════════════════════════
function renderCatalog() {
  const q = (document.getElementById('cat-search')?.value || '').toLowerCase();
  let list = allProducts;
  if (q) list = list.filter(p =>
    p.descripcion.toLowerCase().includes(q) ||
    p.codigo.toLowerCase().includes(q)
  );

  const customCodes = new Set(productosCustom.map(p => p.codigo.toUpperCase()));
  const tbody = document.getElementById('catalog-tbody');
  tbody.innerHTML = list.map(p => {
    const isCustom = customCodes.has(p.codigo.toUpperCase());
    return `<tr>
      <td class="code-cell">${escHtml(p.codigo)}</td>
      <td style="font-size:.82rem">${escHtml(p.descripcion)}</td>
      <td class="unit-cell">${p.unidad}</td>
      <td style="font-size:.78rem;color:var(--muted)">${p.grupo || '—'}</td>
      <td><span class="badge ${isCustom ? 'badge-pending' : 'badge-approved'}" style="font-size:.65rem">${isCustom ? 'Custom' : 'Base'}</span></td>
      <td>${isCustom ? `<button class="btn btn-sm" style="font-size:.72rem;background:rgba(247,95,95,.1);color:var(--red);border:1px solid rgba(247,95,95,.25)" onclick="deleteProduct('${p.codigo}')">Eliminar</button>` : ''}</td>
    </tr>`;
  }).join('');
}

async function deleteProduct(codigo) {
  if (!confirm('¿Eliminar este producto del catálogo personalizado?')) return;
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/productos_custom?codigo=eq.${encodeURIComponent(codigo)}`, {
      method: 'PATCH',
      headers: { ...SUPA_HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ activo: false })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    toast('Producto desactivado.', 'ok');
    await loadCustomProducts();
    renderCatalog();
  } catch(e) { toast('Error: ' + e.message, 'err'); }
}

// ════════════════════════════════════════════════════
//  MODAL NUEVO PRODUCTO
// ════════════════════════════════════════════════════
function openAddProduct(prefillDesc) {
  document.getElementById('np-codigo').value = '';
  document.getElementById('np-descripcion').value = prefillDesc || '';
  document.getElementById('np-subgrupo').value = '';
  document.getElementById('np-unidad').value = 'UND';
  document.getElementById('np-grupo').value = '';
  pendingNewProduct = { rowId: rowCounter }; // guardar fila activa
  document.getElementById('modal-product').classList.add('open');
  setTimeout(() => document.getElementById('np-codigo').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-product').classList.remove('open');
  pendingNewProduct = null;
}

async function saveNewProduct() {
  const codigo = document.getElementById('np-codigo').value.trim();
  const descripcion = document.getElementById('np-descripcion').value.trim();
  const unidad = document.getElementById('np-unidad').value;
  const grupo = document.getElementById('np-grupo').value;
  const subgrupo = document.getElementById('np-subgrupo').value.trim();

  if (!codigo || !descripcion) {
    toast('Código y descripción son obligatorios.', 'err');
    return;
  }
  // Verificar duplicado
  if (allProducts.find(p => p.codigo.toUpperCase() === codigo.toUpperCase())) {
    toast('Ya existe un producto con ese código.', 'err');
    return;
  }

  const btn = document.getElementById('save-product-btn');
  btn.disabled = true; btn.textContent = 'Guardando...';

  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/productos_custom`, {
      method: 'POST',
      headers: { ...SUPA_HEADERS, 'Prefer': 'return=representation' },
      body: JSON.stringify({ codigo, descripcion, unidad, grupo, subgrupo, creado_por: SESSION.username })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const [newP] = await r.json();
    productosCustom.push(newP);
    rebuildAllProducts();
    toast('✔ Producto agregado al catálogo.', 'ok');
    closeModal();
    // Auto-seleccionar en la última fila activa
    if (pendingNewProduct) selectProduct(pendingNewProduct.rowId, { codigo, descripcion, unidad, grupo, subgrupo });
    if (document.getElementById('panel-products').classList.contains('active')) renderCatalog();
  } catch(e) {
    toast('Error al guardar: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Guardar producto';
  }
}

// Cerrar modal al hacer click afuera
document.getElementById('modal-product').addEventListener('mousedown', function(e) {
  if (e.target === this) closeModal();
});

// ════════════════════════════════════════════════════
//  UTILIDADES
// ════════════════════════════════════════════════════
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}
</script>
</body>
</html>
